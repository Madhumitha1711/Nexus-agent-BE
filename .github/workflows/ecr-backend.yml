name: "ECR-Deployment-Backend"

on:
  push:
    branches:
      - main

jobs:
  ECR_Deployment:
    name: Build Backend Docker Image And Push To ECR
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout
        uses: actions/checkout@v4    

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ARM64 backend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_BACKEND: ${{ secrets.ECR_REPOSITORY_BACKEND }}
          IMAGE_TAG: latest
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG \
            --push .

  Deploy_To_EC2:
    name: Deploy Latest Backend Image To EC2
    needs: ECR_Deployment
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            docker pull \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY_BACKEND }}:latest

            docker stop backend || true
            docker rm backend || true

            docker run -d \
              --name backend \
              --network nexus \
              --restart unless-stopped \
              -p 8123:8123 \
              -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              -e LLAMA_CLOUD_API_KEY=${{ secrets.LLAMA_CLOUD_API_KEY }} \
              -e TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }} \
              -e LANGCHAIN_TRACING_V2=true \
              -e LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }} \
              -e LANGCHAIN_PROJECT=AI_Assistant_Project \
              -e LANGSMITH_ENDPOINT=https://api.smith.langchain.com \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY_BACKEND }}:latest